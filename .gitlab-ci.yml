stages:
  - build
  - test
  - cleanup

variables:
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  DOCKER_BUILDKIT: "1"

# ── Build ──────────────────────────────────────────────────────────────────────
build:
  stage: build
  retry: 1
  image: docker:27
  services:
    - docker:27-dind
  before_script:
    - until docker info; do sleep 1; done
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker pull $CI_REGISTRY_IMAGE:latest || true
    - docker build
        --cache-from $CI_REGISTRY_IMAGE:latest
        --build-arg BUILDKIT_INLINE_CACHE=1
        -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
        -t $CI_REGISTRY_IMAGE:latest
        servo/
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
    - docker push $CI_REGISTRY_IMAGE:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"
  timeout: 3h

# ── Unit tests ─────────────────────────────────────────────────────────────────
test-unit:
  stage: test
  image: rust:1.92
  script:
    - cd servo
    - cargo test -p nightglow --locked -- --test-threads=4
  rules:
    - when: on_success
  timeout: 30m
  artifacts:
    when: always
    reports:
      junit: servo/test-results/unit-*.xml
    expire_in: 1 week

# ── Integration tests ──────────────────────────────────────────────────────────
test-integration:
  stage: test
  needs:
    - build
  image: docker:27
  services:
    - docker:27-dind
  before_script:
    - until docker info; do sleep 1; done
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker pull $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
    - docker network create testnet
    - |
      docker run -d \
        --name nightglow-server \
        --network testnet \
        $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA \
        --headless --webdriver 7000 about:blank
    # Resolve IP so the Host header is an IP address — Servo's WebDriver
    # server whitelists all IP-addressed requests but rejects unknown domain names.
    - NIGHTGLOW_IP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' nightglow-server)
    - echo "nightglow-server IP = $NIGHTGLOW_IP"
    - |
      docker run --rm \
        --name nightglow-tests \
        --network testnet \
        -v "$CI_PROJECT_DIR/servo/tests/integration:/tests" \
        python:3.12-slim \
        python3 /tests/webdriver_tests.py \
          --url "http://${NIGHTGLOW_IP}:7000" \
          --junit /tests/test-results/webdriver.xml
  after_script:
    - docker stop nightglow-server 2>/dev/null || true
    - docker rm   nightglow-server 2>/dev/null || true
    - docker network rm testnet    2>/dev/null || true
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"
  timeout: 15m
  artifacts:
    when: always
    paths:
      - servo/tests/integration/test-results/
    reports:
      junit: servo/tests/integration/test-results/webdriver.xml
    expire_in: 1 week

# ── Cleanup ────────────────────────────────────────────────────────────────────
cleanup:
  stage: cleanup
  image: alpine:3.20
  before_script:
    - apk add --no-cache curl jq
  script:
    - |
      REPOS=$(curl -sf --header "PRIVATE-TOKEN: $GITLAB_CLEANUP_TOKEN" \
        "$CI_API_V4_URL/projects/$CI_PROJECT_ID/registry/repositories" | jq -r '.[].id')
      for REPO_ID in $REPOS; do
        echo "→ Cleaning repo $REPO_ID"
        STALE=$(curl -sf --header "PRIVATE-TOKEN: $GITLAB_CLEANUP_TOKEN" \
          "$CI_API_V4_URL/projects/$CI_PROJECT_ID/registry/repositories/$REPO_ID/tags?per_page=100" | \
          jq -r '.[] | select(.name | test("^[0-9a-f]{8}$")) | .name')
        for TAG in $STALE; do
          echo "  Deleting $TAG"
          curl -sf -X DELETE --header "PRIVATE-TOKEN: $GITLAB_CLEANUP_TOKEN" \
            "$CI_API_V4_URL/projects/$CI_PROJECT_ID/registry/repositories/$REPO_ID/tags/$TAG" || true
        done
      done
  needs:
    - build
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"
      when: on_success
  allow_failure: true

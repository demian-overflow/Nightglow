stages:
  - build
  - test
  - fingerprint
  - creepjs
  - cleanup

variables:
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  DOCKER_BUILDKIT: "1"

# ── Build ──────────────────────────────────────────────────────────────────────
build:
  stage: build
  retry: 1
  image: docker:27
  services:
    - docker:27-dind
  before_script:
    - until docker info; do sleep 1; done
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker pull $CI_REGISTRY_IMAGE:latest || true
    - docker build
        --cache-from $CI_REGISTRY_IMAGE:latest
        --build-arg BUILDKIT_INLINE_CACHE=1
        -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
        -t $CI_REGISTRY_IMAGE:latest
        servo/
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
    - docker push $CI_REGISTRY_IMAGE:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"
  timeout: 3h

# ── Unit tests ─────────────────────────────────────────────────────────────────
test-unit:
  stage: test
  image: rust:1.92
  script:
    - cd servo
    - cargo test -p nightglow --locked -- --test-threads=4
  rules:
    - when: on_success
  timeout: 30m
  artifacts:
    when: always
    reports:
      junit: servo/test-results/unit-*.xml
    expire_in: 1 week

# ── Integration tests ──────────────────────────────────────────────────────────
test-integration:
  stage: test
  needs:
    - build
  image: docker:27
  services:
    - docker:27-dind
  before_script:
    - until docker info; do sleep 1; done
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker pull $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
    - docker network create testnet
    - |
      docker run -d \
        --name nightglow-server \
        --network testnet \
        $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA \
        --headless --webdriver 7000 about:blank
    # Resolve IP — Servo's WebDriver whitelists IP-addressed requests but
    # rejects unknown domain names.
    - NIGHTGLOW_IP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' nightglow-server)
    - echo "nightglow-server IP = $NIGHTGLOW_IP"
    - |
      docker run --rm \
        --name nightglow-tests \
        --network testnet \
        -v "$CI_PROJECT_DIR/servo/tests/integration:/tests" \
        python:3.12-slim \
        python3 /tests/webdriver_tests.py \
          --url "http://${NIGHTGLOW_IP}:7000" \
          --junit /tests/test-results/webdriver.xml
  after_script:
    - docker stop nightglow-server 2>/dev/null || true
    - docker rm   nightglow-server 2>/dev/null || true
    - docker network rm testnet    2>/dev/null || true
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"
  timeout: 15m
  artifacts:
    when: always
    paths:
      - servo/tests/integration/test-results/
    reports:
      junit: servo/tests/integration/test-results/webdriver.xml
    expire_in: 1 week

# ── Proxy integration tests ────────────────────────────────────────────────────
#
# NOTE: allow_failure: true — proxy routing is not yet implemented in servoshell.
# Remove allow_failure once --proxy support lands.
test-proxy:
  stage: test
  allow_failure: true
  needs:
    - build
  image: docker:27
  services:
    - docker:27-dind
  before_script:
    - until docker info; do sleep 1; done
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker pull $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
    - docker network create proxynet
    - |
      docker run -d \
        --name proxy-server \
        --network proxynet \
        -v "$CI_PROJECT_DIR/servo/tests/integration:/tests" \
        python:3.12-slim \
        python3 /tests/proxy_server.py --host 0.0.0.0 --port 8888
    - PROXY_IP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' proxy-server)
    - echo "proxy-server IP = $PROXY_IP"
    - sleep 2
    - |
      docker run -d \
        --name nightglow-proxy \
        --network proxynet \
        -e http_proxy="http://${PROXY_IP}:8888" \
        -e https_proxy="http://${PROXY_IP}:8888" \
        $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA \
        --headless --webdriver 7001 about:blank
    - NIGHTGLOW_IP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' nightglow-proxy)
    - echo "nightglow-proxy IP = $NIGHTGLOW_IP"
    - sleep 3
    - |
      docker run --rm \
        --name nightglow-proxy-tests \
        --network proxynet \
        -v "$CI_PROJECT_DIR/servo/tests/integration:/tests" \
        python:3.12-slim \
        python3 /tests/proxy_tests.py \
          --webdriver-url "http://${NIGHTGLOW_IP}:7001" \
          --proxy-port 8889 \
          --junit /tests/test-results/proxy.xml
  after_script:
    - docker stop  nightglow-proxy    2>/dev/null || true
    - docker rm    nightglow-proxy    2>/dev/null || true
    - docker stop  proxy-server       2>/dev/null || true
    - docker rm    proxy-server       2>/dev/null || true
    - docker network rm proxynet      2>/dev/null || true
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"
  timeout: 10m
  artifacts:
    when: always
    paths:
      - servo/tests/integration/test-results/
    reports:
      junit: servo/tests/integration/test-results/proxy.xml
    expire_in: 1 week

# ── Fingerprint report ─────────────────────────────────────────────────────────
fingerprint:
  stage: fingerprint
  needs:
    - build
  image: docker:27
  services:
    - docker:27-dind
  before_script:
    - until docker info; do sleep 1; done
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker pull $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
    - docker network create fpnet
    - |
      docker run -d \
        --name nightglow-fp \
        --network fpnet \
        $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA \
        --headless --webdriver 7000 about:blank
    - NIGHTGLOW_IP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' nightglow-fp)
    - echo "nightglow IP = $NIGHTGLOW_IP"
    - sleep 3
    - |
      docker run --rm \
        --network fpnet \
        -v "$CI_PROJECT_DIR/servo/tests/integration:/tests" \
        python:3.12-slim \
        python3 /tests/fingerprint_report.py --url "http://$NIGHTGLOW_IP:7000" \
        2>&1 | tee fingerprint-output.txt
  after_script:
    - docker stop nightglow-fp 2>/dev/null || true
    - docker rm   nightglow-fp 2>/dev/null || true
    - docker network rm fpnet  2>/dev/null || true
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"
  timeout: 10m
  allow_failure: true
  artifacts:
    when: always
    paths:
      - fingerprint-output.txt
    expire_in: 2 weeks

# ── CreepJS headless-resistance test ──────────────────────────────────────────
creepjs:
  stage: creepjs
  needs:
    - build
  image: docker:27
  services:
    - docker:27-dind
  before_script:
    - until docker info; do sleep 1; done
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker pull $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
    - docker network create creepnet
    - |
      docker run -d \
        --name nightglow-creep \
        --network creepnet \
        $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA \
        --headless --webdriver 7000 about:blank
    - NIGHTGLOW_IP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' nightglow-creep)
    - echo "nightglow IP = $NIGHTGLOW_IP"
    - sleep 3
    - |
      docker run --rm \
        --network creepnet \
        -v "$CI_PROJECT_DIR/servo/tests/integration:/tests" \
        python:3.12-slim \
        python3 /tests/creepjs_test.py \
          --url "http://$NIGHTGLOW_IP:7000" \
          --threshold 0 \
        2>&1 | tee creepjs-output.txt
  after_script:
    - docker stop nightglow-creep 2>/dev/null || true
    - docker rm   nightglow-creep 2>/dev/null || true
    - docker network rm creepnet  2>/dev/null || true
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"
  timeout: 5m
  allow_failure: true
  artifacts:
    when: always
    paths:
      - creepjs-output.txt
    expire_in: 2 weeks

# ── Cleanup ────────────────────────────────────────────────────────────────────
cleanup:
  stage: cleanup
  image: alpine:3.20
  before_script:
    - apk add --no-cache curl jq
  script:
    - |
      # Only delete SHA tags older than 4 hours to avoid racing with concurrent pipelines
      CUTOFF=$(date -u -d "-14400 seconds" '+%Y-%m-%dT%H:%M:%S')
      echo "Deleting SHA tags created before $CUTOFF"
      REPOS=$(curl -sf --header "PRIVATE-TOKEN: $GITLAB_CLEANUP_TOKEN" \
        "$CI_API_V4_URL/projects/$CI_PROJECT_ID/registry/repositories" | jq -r '.[].id')
      for REPO_ID in $REPOS; do
        echo "→ Cleaning repo $REPO_ID"
        STALE=$(curl -sf --header "PRIVATE-TOKEN: $GITLAB_CLEANUP_TOKEN" \
          "$CI_API_V4_URL/projects/$CI_PROJECT_ID/registry/repositories/$REPO_ID/tags?per_page=100" | \
          jq -r --arg cutoff "$CUTOFF" '.[] | select(.name | test("^[0-9a-f]{8}$")) | select(.created_at < $cutoff) | .name')
        for TAG in $STALE; do
          echo "  Deleting $TAG"
          curl -sf -X DELETE --header "PRIVATE-TOKEN: $GITLAB_CLEANUP_TOKEN" \
            "$CI_API_V4_URL/projects/$CI_PROJECT_ID/registry/repositories/$REPO_ID/tags/$TAG" || true
        done
      done
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"
      when: on_success
  allow_failure: true

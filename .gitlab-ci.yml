stages:
  - build
  - test
  - cleanup

variables:
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  DOCKER_BUILDKIT: "1"

# ── Build ──────────────────────────────────────────────────────────────────────
build:
  stage: build
  retry: 1
  image: docker:27
  services:
    - docker:27-dind
  before_script:
    - until docker info; do sleep 1; done
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker pull $CI_REGISTRY_IMAGE:latest || true
    - docker build
        --cache-from $CI_REGISTRY_IMAGE:latest
        --build-arg BUILDKIT_INLINE_CACHE=1
        -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
        -t $CI_REGISTRY_IMAGE:latest
        servo/
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
    - docker push $CI_REGISTRY_IMAGE:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"
  timeout: 3h

# ── Unit tests ─────────────────────────────────────────────────────────────────
test-unit:
  stage: test
  image: rust:1.92
  script:
    - cd servo
    - cargo test -p nightglow --locked -- --test-threads=4
  rules:
    - when: on_success
  timeout: 30m
  artifacts:
    when: always
    reports:
      junit: servo/test-results/unit-*.xml
    expire_in: 1 week

# ── Integration tests ──────────────────────────────────────────────────────────
test-integration:
  stage: test
  needs:
    - build
  image: docker:27
  services:
    - docker:27-dind
  before_script:
    - until docker info; do sleep 1; done
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker pull $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
    - docker network create testnet
    - |
      docker run -d \
        --name nightglow-server \
        --network testnet \
        $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA \
        --headless --webdriver 7000 \
        --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
        --nightglow-profile '{"user_agent":"Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36","platform":"Win32","app_version":"5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36","product":"Gecko","vendor":"Google Inc.","vendor_sub":"","product_sub":"20030107","language":"en-US","accept_language":"en-US,en;q=0.9","timezone":"America/New_York","timezone_offset":-300,"screen_width":1920,"screen_height":1080,"screen_avail_width":1920,"screen_avail_height":1040,"color_depth":24,"pixel_depth":24,"device_pixel_ratio":1.0,"inner_width":1280,"inner_height":720,"outer_width":1920,"outer_height":1080,"hardware_concurrency":8,"device_memory":8.0,"plugins":[{"name":"PDF Viewer","description":"Portable Document Format","filename":"internal-pdf-viewer","mime_types":["application/pdf","text/pdf"]}],"fonts":[],"canvas_noise_seed":12345678,"webgl_vendor":"Google Inc. (NVIDIA)","webgl_renderer":"ANGLE (NVIDIA, NVIDIA GeForce RTX 3070 Direct3D11 vs_5_0 ps_5_0, D3D11)","webgl_unmasked_vendor":"NVIDIA Corporation","webgl_unmasked_renderer":"NVIDIA GeForce RTX 3070","audio_noise_seed":87654321,"proxy":null,"spoofed_ip":null,"do_not_track":false,"cookie_enabled":true,"java_enabled":false,"pdf_viewer_enabled":true,"hide_webdriver":true,"max_touch_points":0,"label":"chrome124-win11-us-east","id":"00000000-0000-0000-0000-000000000001"}' \
        about:blank
    # Resolve IP so the Host header is an IP address — Servo's WebDriver
    # server whitelists all IP-addressed requests but rejects unknown domain names.
    - NIGHTGLOW_IP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' nightglow-server)
    - echo "nightglow-server IP = $NIGHTGLOW_IP"
    - |
      docker run --rm \
        --name nightglow-tests \
        --network testnet \
        -v "$CI_PROJECT_DIR/servo/tests/integration:/tests" \
        python:3.12-slim \
        python3 /tests/webdriver_tests.py \
          --url "http://${NIGHTGLOW_IP}:7000" \
          --junit /tests/test-results/webdriver.xml
  after_script:
    - docker stop nightglow-server 2>/dev/null || true
    - docker rm   nightglow-server 2>/dev/null || true
    - docker network rm testnet    2>/dev/null || true
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"
  timeout: 15m
  artifacts:
    when: always
    paths:
      - servo/tests/integration/test-results/
    reports:
      junit: servo/tests/integration/test-results/webdriver.xml
    expire_in: 1 week

# ── Proxy integration tests ────────────────────────────────────────────────────
#
# NOTE: allow_failure: true — proxy routing is not yet implemented in servoshell.
# The job runs the tests so results are recorded, but a failure does not block
# the pipeline.  Remove allow_failure once --proxy support lands.
test-proxy:
  stage: test
  allow_failure: true
  needs:
    - build
  image: docker:27
  services:
    - docker:27-dind
  before_script:
    - until docker info; do sleep 1; done
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker pull $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
    - docker network create proxynet

    # 1. Start the proxy server container.  It blocks after printing its address.
    - |
      docker run -d \
        --name proxy-server \
        --network proxynet \
        -v "$CI_PROJECT_DIR/servo/tests/integration:/tests" \
        python:3.12-slim \
        python3 /tests/proxy_server.py --host 0.0.0.0 --port 8888

    # 2. Resolve proxy container IP
    - PROXY_IP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' proxy-server)
    - echo "proxy-server IP = $PROXY_IP"
    - sleep 2

    # 3. Start servoshell configured to use the proxy
    - |
      docker run -d \
        --name nightglow-proxy \
        --network proxynet \
        -e http_proxy="http://${PROXY_IP}:8888" \
        -e https_proxy="http://${PROXY_IP}:8888" \
        $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA \
        --headless --webdriver 7001 \
        about:blank
    - NIGHTGLOW_IP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' nightglow-proxy)
    - echo "nightglow-proxy IP = $NIGHTGLOW_IP"
    - sleep 3

    # 4. Run the proxy tests (they start their own internal proxy thread and
    #    hit the servoshell instance that was configured with PROXY_IP above).
    #    We pass --proxy-port 8889 so the test-internal proxy listens on a
    #    different port and does not conflict with the standalone proxy-server.
    - |
      docker run --rm \
        --name nightglow-proxy-tests \
        --network proxynet \
        -v "$CI_PROJECT_DIR/servo/tests/integration:/tests" \
        python:3.12-slim \
        python3 /tests/proxy_tests.py \
          --webdriver-url "http://${NIGHTGLOW_IP}:7001" \
          --proxy-port 8889 \
          --junit /tests/test-results/proxy.xml

  after_script:
    - docker stop  nightglow-proxy    2>/dev/null || true
    - docker rm    nightglow-proxy    2>/dev/null || true
    - docker stop  proxy-server       2>/dev/null || true
    - docker rm    proxy-server       2>/dev/null || true
    - docker network rm proxynet      2>/dev/null || true
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"
  timeout: 10m
  artifacts:
    when: always
    paths:
      - servo/tests/integration/test-results/
    reports:
      junit: servo/tests/integration/test-results/proxy.xml
    expire_in: 1 week

# ── Cleanup ────────────────────────────────────────────────────────────────────
cleanup:
  stage: cleanup
  image: alpine:3.20
  before_script:
    - apk add --no-cache curl jq
  script:
    - |
      # Only delete SHA tags older than 4 hours to avoid racing with concurrent pipelines
      CUTOFF=$(date -u -d "-14400 seconds" '+%Y-%m-%dT%H:%M:%S')
      echo "Deleting SHA tags created before $CUTOFF"
      REPOS=$(curl -sf --header "PRIVATE-TOKEN: $GITLAB_CLEANUP_TOKEN" \
        "$CI_API_V4_URL/projects/$CI_PROJECT_ID/registry/repositories" | jq -r '.[].id')
      for REPO_ID in $REPOS; do
        echo "→ Cleaning repo $REPO_ID"
        STALE=$(curl -sf --header "PRIVATE-TOKEN: $GITLAB_CLEANUP_TOKEN" \
          "$CI_API_V4_URL/projects/$CI_PROJECT_ID/registry/repositories/$REPO_ID/tags?per_page=100" | \
          jq -r --arg cutoff "$CUTOFF" '.[] | select(.name | test("^[0-9a-f]{8}$")) | select(.created_at < $cutoff) | .name')
        for TAG in $STALE; do
          echo "  Deleting $TAG"
          curl -sf -X DELETE --header "PRIVATE-TOKEN: $GITLAB_CLEANUP_TOKEN" \
            "$CI_API_V4_URL/projects/$CI_PROJECT_ID/registry/repositories/$REPO_ID/tags/$TAG" || true
        done
      done
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"
      when: on_success
  allow_failure: true
